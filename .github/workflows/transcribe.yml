name: Hourly Podcast Transcribe

on:
  schedule:
    - cron: '0 23 * * *'  # 23:00 UTC
    - cron: '0 0-5 * * *' # 00:00 - 05:00 UTC
  workflow_dispatch:

jobs:

  # ── Job 1: lightweight check (~5 seconds, no pip installs) ──────────────────
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new_episode: ${{ steps.rss.outputs.new_episode }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Check RSS for new episode
        id: rss
        run: |
          python - <<'EOF'
          import urllib.request, xml.etree.ElementTree as ET, os

          RSS_URL = "https://anchor.fm/s/f7cac464/podcast/rss"
          TRACKER_FILE = "last_episode.txt"

          with urllib.request.urlopen(RSS_URL) as r:
              root = ET.fromstring(r.read())

          latest = root.find("channel").findall("item")[0]
          mp3_url = latest.find("enclosure").attrib["url"]

          last_url = open(TRACKER_FILE).read().strip() if os.path.exists(TRACKER_FILE) else ""

          is_new = "true" if mp3_url != last_url else "false"
          print(f"New episode: {is_new}")

          # Write to GitHub Actions output
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_episode={is_new}\n")
          EOF

  # ── Job 2: only runs when Job 1 signals a new episode ───────────────────────
  transcribe:
    needs: check
    if: needs.check.outputs.new_episode == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 240

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install openai-whisper setuptools-rust
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache Whisper Model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: ${{ runner.os }}-whisper-small

      - name: Run Script
        run: python transcribe.py

      - name: Commit and Push Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_episode.txt transcripts/
          git commit -m "Add transcript: $(date +'%Y-%m-%d')" || exit 0
          git push
