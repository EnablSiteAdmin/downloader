name: Hourly Podcast Transcribe
on:
  schedule:
    - cron: '0 22-23 * * *'
    - cron: '0 0-4 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new_episode: ${{ steps.rss.outputs.new_episode }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Check RSS for new episode
        id: rss
        run: |
          python - <<'EOF'
          import urllib.request, xml.etree.ElementTree as ET, os
          RSS_URL = "https://anchor.fm/s/f7cac464/podcast/rss"
          TRACKER_FILE = "last_episode.txt"
          with urllib.request.urlopen(RSS_URL) as r:
              root = ET.fromstring(r.read())
          latest = root.find("channel").findall("item")[0]
          mp3_url = latest.find("enclosure").attrib["url"]
          last_url = open(TRACKER_FILE).read().strip() if os.path.exists(TRACKER_FILE) else ""
          is_new = "true" if mp3_url != last_url else "false"
          print(f"New episode: {is_new}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_episode={is_new}\n")
          EOF

  transcribe:
    needs: check
    if: needs.check.outputs.new_episode == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 240
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-faster-whisper
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache faster-whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: ${{ runner.os }}-whisper-model-small
          restore-keys: |
            ${{ runner.os }}-whisper-model-

      - name: Install dependencies
        run: |
          pip install faster-whisper

      - name: Run Script
        run: python transcribe.py

      - name: Commit and Push Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_episode.txt transcripts/
          git commit -m "Add transcript: $(date +'%Y-%m-%d')" || exit 0
          git push